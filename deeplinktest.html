<script>
            

// Android Intent
//"S.linkUrl=" + encodeURIComponent("https://www.myangel.co.kr")
// iOS Custom Scheme
//"insuremas://main_web?linkUrl=" + encodeURIComponent("https://www.myangel.co.kr")
//"S.linkUrl=" + btoa("https://www.myangel.co.kr") => 보안 효과는 없고 외부에서 URL이 바로 안 보이는 정도.
// → S.linkUrl=aHR0cHM6Ly93d3cubXlhbmdlbC5jby5rcg==
function openInsureMasApp() {
  var userAgent = navigator.userAgent.toLowerCase();

  if (userAgent.match(/android/i)) {
    // 1. Android: JS 타이머 대신 Intent의 'browser_fallback_url' 사용 (가장 안정적)
    // 앱이 없으면 크롬/안드로이드OS가 알아서 스토어 주소로 이동시킵니다.
    var fallbackUrl = encodeURIComponent("https://play.google.com/store/apps/details?id=com.insure.mas.aos");
    var intentUri = "intent://main_web#Intent;scheme=insuremas;package=com.insure.mas.aos;S.linkUrl=https://www.myangel.co.kr;S.browser_fallback_url=" + fallbackUrl + ";end;";
    
    window.location.href = intentUri;

  } else if (userAgent.match(/iphone|ipad|ipod/i)) {
    // 2. iOS: Custom Scheme 호출 후 타이머로 스토어 이동 제어
    var clickedAt = +new Date();
    window.location.href = "insuremas://main_web?linkUrl=https://www.myangel.co.kr";
    
    var timeout = setTimeout(function () {
      // 알림창 대기 시간 등으로 지연 발생 시 스토어 이동 방지 (2500ms 이내일 때만 이동)
      if (+new Date() - clickedAt < 2500) {
        window.location.href = "https://apps.apple.com/app/id6743102604";
      }
    }, 2000);

    // 3. iOS 방어 로직: 앱이 열려서 화면이 가려지면 즉시 스토어 이동 타이머 해제
    var clearTimer = function() {
      clearTimeout(timeout);
      timeout = null; // 추가
      document.removeEventListener("visibilitychange", visibilityHandler);
      window.removeEventListener("blur", clearTimer);
    };

    var visibilityHandler = function() {
      if (document.visibilityState === 'hidden') {
        clearTimer();
      }
    };

    document.addEventListener("visibilitychange", visibilityHandler);
    window.addEventListener("blur", clearTimer); // 구형 iOS 사파리 대응
  }
}

function openAppNew() {
  var userAgent = navigator.userAgent || navigator.vendor || window.opera;
  var timeout;
  var clickedAt = +new Date(); // 클릭(실행) 시점의 시간 저장

  if (/android/i.test(userAgent)) {
    // Android Intent
    window.location.href = "intent://main_web#Intent;scheme=insuremas;package=com.insure.mas.aos;S.linkUrl=https://www.myangel.co.kr;end;";
    
    timeout = setTimeout(function () {
      // 2초(2000ms)로 설정했지만, 브라우저 환경에 따라 지연이 발생했을 수 있으므로 2500ms 이내일 때만 스토어로 이동
      if (+new Date() - clickedAt < 2500) { 
        window.location.href = "https://play.google.com/store/apps/details?id=com.insure.mas.aos";
      }
    }, 2000);
    
  } else if (/iPhone|iPad|iPod/i.test(userAgent)) {
    // iOS Custom Scheme (오타 수정됨)
    window.location.href = "insuremas://main_web?linkUrl=https://www.myangel.co.kr";
    
    timeout = setTimeout(function () {
      if (+new Date() - clickedAt < 2500) {
        window.location.href = "https://apps.apple.com/app/id6743102604";
      }
    }, 2000);
  }

  // 앱으로 이동하여 화면이 가려지면 타이머 해제 (최신 권장 방식)
  document.addEventListener("visibilitychange", function() {
    if (document.visibilityState === 'hidden') {
      clearTimeout(timeout);
    }
  });

  // 구형 브라우저를 위한 폴백
  window.onblur = function () {
    clearTimeout(timeout);
  };
}


function openApp() {
  var userAgent = navigator.userAgent || navigator.vendor || window.opera;
  var now = Date.now();
  var timeout;

  if (/android/i.test(userAgent)) {
	// Android: 앱 실행 → 실패 시 Play Store 이동
	window.location.href = "intent://main_web#Intent;scheme=insuremas;package=com.insure.mas.aos;S.linkUrl=https://www.myangel.co.kr;end;";
	timeout = setTimeout(function () {
	  window.location.href = "https://play.google.com/store/apps/details?id=com.insure.mas.aos";
	}, 2000);
  } else if (/iPhone|iPad|iPod/i.test(userAgent)) {
	// iOS: 앱 실행 → 실패 시 App Store 이동
	window.location.href = "insuremas://main_web?linkUrl=https://www.myangel.co.kr";
	timeout = setTimeout(function () {
	  window.location.href = "https://apps.apple.com/app/id6743102604";
	}, 2000);
  }

  // 페이지 이탈 감지 시 timeout 취소
  window.onblur = function () {
	clearTimeout(timeout);
  };
}

function openApp2() {
  var userAgent = navigator.userAgent || navigator.vendor || window.opera;
  var now = Date.now();
  var timeout;

  if (/android/i.test(userAgent)) {
	  window.location.href = "https://play.google.com/store/apps/details?id=com.insure.mas.aos";
  } else if (/iPhone|iPad|iPod/i.test(userAgent)) {
	  window.location.href = "https://apps.apple.com/app/id6743102604";
  }
}





function generateDeepLinks() {
// input에서 값 가져오기
let linkUrl = document.getElementById("urlInput").value.trim();

// URL 인코딩 (필요한 경우)
let encodedLinkUrl = encodeURIComponent(linkUrl);

// 안드로이드 전체주소 딥링크
let androidDeepLinkFull = `intent://main_web#Intent;scheme=insuremas;package=com.insure.mas.aos;S.linkUrl=${encodedLinkUrl};end;`;

// iOS 전체주소 딥링크
let iosDeepLinkFull = `insuremas://main_web?linkUrl=${encodedLinkUrl}`;


// 생성된 딥링크를 a 태그에 적용
document.getElementById("androidDeepLinkFull").href = androidDeepLinkFull;
document.getElementById("androidDeepLinkFull").innerText = androidDeepLinkFull;


document.getElementById("iosDeepLinkFull").href = iosDeepLinkFull;
document.getElementById("iosDeepLinkFull").innerText = iosDeepLinkFull;

}
